<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 朝のニュース | OGA-VERSE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: #667eea;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .updated-time {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .news-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .news-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
        }

        .source-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
            width: fit-content;
        }

        .source-natalie { background: #ffb3ba; color: #c00; }
        .source-musicman { background: #ffffba; color: #996600; }
        .source-billboard { background: #baffc9; color: #00661a; }
        .source-rollingstone { background: #bae1ff; color: #003d99; }

        .news-card h3 {
            font-size: 16px;
            line-height: 1.4;
            margin-bottom: 10px;
            color: #222;
            flex-grow: 1;
        }

        .news-card p {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 10px;
            flex-grow: 1;
        }

        .news-card a {
            color: #667eea;
            text-decoration: none;
            font-size: 13px;
            margin-top: auto;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }

        .news-card a:hover {
            text-decoration: underline;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 18px;
            padding: 40px;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .news-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 朝のニュース</h1>
            <p>音楽業界の最新ニュースをお届け</p>
            <div class="updated-time" id="updated-time">読み込み中...</div>
        </div>

        <div id="news-container" class="news-grid">
            <div class="loading">読み込み中...</div>
        </div>
    </div>

    <script>
        async function loadNews() {
            try {
                const response = await fetch('./news.json');
                const data = await response.json();

                const container = document.getElementById('news-container');
                container.innerHTML = '';

                if (data.articles.length === 0) {
                    container.innerHTML = '<div class="error">ニュースを取得できませんでした</div>';
                    return;
                }

                data.articles.forEach(article => {
                    const sourceKey = `source-${article.source.toLowerCase().replace(/[\s・]/g, '')}`;
                    const card = document.createElement('div');
                    card.className = 'news-card';
                    card.innerHTML = `
                        <span class="source-badge ${sourceKey}">${article.source}</span>
                        <h3>${article.title}</h3>
                        <p>${article.summary || 'ニュースを見る'}</p>
                        <a href="${article.link}" target="_blank" rel="noopener noreferrer">続きを読む →</a>
                    `;
                    container.appendChild(card);
                });

                const dateObj = new Date(data.updated);
                const formatted = dateObj.toLocaleString('ja-JP');
                document.getElementById('updated-time').textContent = `最終更新: ${formatted}`;

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('news-container').innerHTML =
                    '<div class="error">エラーが発生しました。後でもう一度お試しください。</div>';
            }
        }

        // ページ読み込み時に実行
        loadNews();

        // 5分ごとに更新
        setInterval(loadNews, 300000);
    </script>
</body>
</html>
